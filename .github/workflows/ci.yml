name: CI Pipeline

on:
  push:
    branches: [ main, develop, qa ]
  pull_request:
    branches: [ main, develop, qa ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Typecheck, Audit, Database check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Shadow Database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE postgres_shadow;"

      - name: Apply Prisma Migrations (Deploy)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Verify Schema & Migrations are in Sync (Diff)
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
          SHADOW_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres_shadow?schema=public"

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Run Linter
        run: npm run lint

      - name: TypeScript Typecheck
        run: npm run typecheck

      - name: Verify Audit AST Rules
        run: npm run verify-audit

      - name: Next.js Cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            next-${{ runner.os }}-

      - name: Build Next.js Application
        run: |
          source ./scripts/load-ci-env.sh
          npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}

      - name: Run Unit Tests (Vitest)
        run: npm run test:unit

  e2e:
    name: Playwright End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Playwright Binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (Cache Miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright System Dependencies (Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Next.js Cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            next-${{ runner.os }}-

      - name: Run E2E Tests
        run: |
          source ./scripts/load-ci-env.sh
          npm run test:e2e
        env:
          CI: true
          E2E_MOCK_ENABLED: "true"
          PLAYWRIGHT_TEST_ENV: "true"
          NODE_ENV: "production"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}

      - name: Upload Playwright & Vitest Artifacts (On Failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-failure-reports
          path: |
            playwright-report/
            test-results/
            coverage/
          retention-days: 7
